server {
  listen 80;
  listen [::]:80;
  server_name portal-anwalts.ai;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name portal-anwalts.ai;

  resolver 127.0.0.11 valid=10s;
  resolver_timeout 5s;

  set $frontend_upstream frontend:3000;
  set $backend_upstream backend:8000;

  ssl_certificate     /etc/letsencrypt/live/portal-anwalts.ai/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/portal-anwalts.ai/privkey.pem;
  ssl_session_timeout 1d;
  ssl_session_cache shared:SSL:10m;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  client_max_body_size 50m;

  # Security headers
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Content-Security-Policy "default-src 'self' https:; script-src 'self' 'unsafe-inline' https://accounts.google.com https://events.framer.com https://framerusercontent.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:;" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

  # Supabase API proxy (self-hosted Supabase via Kong gateway)
  location /supabase/realtime/v1/ {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_pass http://host.docker.internal:54321/realtime/v1/;
    proxy_read_timeout 60s;
  }

  location /supabase/ {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_pass http://host.docker.internal:54321/;
    proxy_read_timeout 60s;
  }

  # Auth endpoints handled by Nuxt server middleware (keeps cookie/session logic consistent)
  location ~ ^/api/auth/ {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $http_connection;
    proxy_pass http://$frontend_upstream;
  }

  # Health check endpoints (backend supports both /health and /api/health)
  location ~ ^/api/health {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://$backend_upstream;
  }

  # All other /api/ requests - keep /api prefix (for documents, files, etc)
  location /api/ {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://$backend_upstream;
  }

  # Google OAuth endpoints handled by Nuxt frontend (Supabase PKCE flow)
  location ^~ /auth/google {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection upgrade;
    proxy_pass http://$frontend_upstream$request_uri;
  }

  # Frontend static assets with cache busting
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
    proxy_pass http://$frontend_upstream;
    proxy_set_header Host $host;
    proxy_http_version 1.1;
    
    # Aggressive cache busting for development
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
    add_header X-Cache-Bust "1762166043" always;
  }

  # Frontend SSR (compose DNS: frontend)
  location / {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection upgrade;
    proxy_pass http://$frontend_upstream;
    
    # No cache for HTML pages
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header Pragma "no-cache" always;
    expires -1;
  }
}
